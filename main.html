<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>YSmatchyo — YieldStario Matching Console</title>
  <style>
    :root{
      --bg0:#0b0c10;
      --bg1:#12141c;
      --bg2:#171a24;
      --card:#161a25;
      --card2:#111521;
      --txt:#e8ecff;
      --muted:#a7b0d6;
      --muted2:#7e87b4;
      --ok:#57f29b;
      --warn:#ffdb6e;
      --bad:#ff6b6b;
      --acc:#8a7dff;
      --acc2:#55e0ff;
      --line:#2a2f47;
      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --r: 16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: radial-gradient(1200px 700px at 15% 10%, rgba(138,125,255,.18), transparent 60%),
                  radial-gradient(1200px 700px at 90% 20%, rgba(85,224,255,.14), transparent 55%),
                  radial-gradient(1000px 600px at 50% 95%, rgba(87,242,155,.10), transparent 55%),
                  linear-gradient(180deg, var(--bg0), var(--bg1));
      color:var(--txt);
      font-family:var(--sans);
      overflow-x:hidden;
    }
    a{color:inherit}
    .wrap{max-width:1280px;margin:0 auto;padding:26px 18px 60px}
    .top{
      display:flex;gap:14px;align-items:flex-end;justify-content:space-between;
      padding:18px 18px 14px;border:1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius: calc(var(--r) + 6px);
      box-shadow: var(--shadow);
      position:sticky;top:0;z-index:10;backdrop-filter: blur(10px);
    }
    .brand{display:flex;gap:12px;align-items:center}
    .logo{
      width:42px;height:42px;border-radius:14px;
      background:
        radial-gradient(14px 14px at 30% 35%, rgba(85,224,255,.9), transparent 65%),
        radial-gradient(18px 18px at 70% 55%, rgba(138,125,255,.88), transparent 64%),
        radial-gradient(16px 16px at 55% 80%, rgba(87,242,155,.75), transparent 70%),
        linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      box-shadow: 0 12px 35px rgba(0,0,0,.35);
    }
    .title{display:flex;flex-direction:column}
    .title h1{margin:0;font-size:18px;letter-spacing:.2px}
